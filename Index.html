<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD!</title>
    <style>
        body { background: #fce4ec; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; font-family: sans-serif; }
        .cake { position: relative; width: 100px; height: 70px; background: #6d4c41; border-radius: 10px; }
        .cake::after { content: ""; position: absolute; width: 100px; height: 15px; background: #f8bbd0; top: 15px; border-radius: 10px; }
        .candle { position: absolute; width: 8px; height: 30px; background: white; top: -30px; left: 45px; border-top: 4px solid gold; }
        .flame { position: absolute; width: 12px; height: 18px; background: orange; border-radius: 50%; top: -50px; left: 43px; animation: glow 0.5s infinite alternate; }
        @keyframes glow { from { transform: scale(1); opacity: 0.8; } to { transform: scale(1.3); opacity: 1; box-shadow: 0 0 15px yellow; } }
        .text { color: #c2185b; font-size: 1.8rem; font-weight: bold; text-align: center; margin-top: 20px; animation: bounce 2s infinite; padding: 0 20px; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .confetti { position: absolute; width: 8px; height: 8px; top: -10px; animation: fall 3s linear infinite; }
        @keyframes fall { to { transform: translateY(100vh) rotate(360deg); } }
    </style>
</head>
<body>
    <div class="flame"></div><div class="candle"></div><div class="cake"></div>
    <div class="text">Happy Birthday, My Love! ❤️</div>
    <script>
        const colors = ['#ff4081', '#7c4dff', '#03a9f4', '#8bc34a', '#fbc02d'];
        for (let i = 0; i < 40; i++) {
            const d = document.createElement('div');
            d.className = 'confetti';
            d.style.left = Math.random() * 100 + 'vw';
            d.style.background = colors[Math.floor(Math.random() * colors.length)];
            d.style.animationDuration = (Math.random() * 2 + 2) + 's';
            document.body.appendChild(d);
        }
    </script>
</body>
</html>
